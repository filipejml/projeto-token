<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampusCoin Wallet</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #f8fafc;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      main {
        width: min(92vw, 560px);
        background: #111827;
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 35px rgba(0, 0, 0, 0.25);
      }
      button,
      input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #475569;
        margin-top: 10px;
        font-size: 15px;
      }
      button {
        background: #2563eb;
        color: white;
        cursor: pointer;
      }
      button:disabled {
        background: #64748b;
        cursor: not-allowed;
      }
      .actions {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }
      .balance {
        margin: 16px 0;
        padding: 16px;
        background: #1e293b;
        border-radius: 10px;
        font-size: 20px;
        font-weight: bold;
      }
      .status {
        margin-top: 16px;
        padding: 12px;
        background: #1e293b;
        border-radius: 10px;
        min-height: 24px;
      }
      .status.error {
        color: #fda4af;
      }
      .status.success {
        color: #86efac;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CampusCoin Wallet</h1>
      <p>Conecte sua carteira para consultar o saldo e transferir tokens CAMP.</p>

      <div class="actions">
        <button id="connectBtn">Conectar MetaMask</button>
      </div>

      <label for="contractAddress">Endereço do contrato</label>
      <input id="contractAddress" placeholder="0x1234..." />

      <div class="balance">Saldo: <span id="balance">--</span> CAMP</div>
      <button id="balanceBtn" disabled>Atualizar saldo</button>

      <h2>Transferir tokens</h2>
      <label for="recipient">Carteira de destino</label>
      <input id="recipient" placeholder="0x..." />

      <label for="amount">Quantidade de CAMP</label>
      <input id="amount" type="number" min="0" step="any" placeholder="0,00" />

      <button id="transferBtn" disabled>Transferir CAMP</button>

      <div id="status" class="status">Aguardando conexão...</div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
