<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampusCoin Wallet</title>
    <style>
      :root {
        color-scheme: dark;
        --background: #07111f;
        --surface: rgba(15, 29, 48, 0.88);
        --surface-light: rgba(30, 48, 72, 0.72);
        --border: rgba(148, 163, 184, 0.18);
        --text: #f8fafc;
        --muted: #94a3b8;
        --primary: #6366f1;
        --primary-hover: #818cf8;
        --accent: #22d3ee;
        --success: #86efac;
        --danger: #fda4af;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 15% 15%, rgba(99, 102, 241, 0.2), transparent 32rem),
          radial-gradient(circle at 85% 85%, rgba(34, 211, 238, 0.12), transparent 28rem),
          var(--background);
        color: var(--text);
        margin: 0;
        min-height: 100vh;
        padding: 48px 20px;
      }

      main {
        width: min(100%, 880px);
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 28px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .logo {
        width: 50px;
        height: 50px;
        display: grid;
        place-items: center;
        border-radius: 15px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: white;
        font-size: 21px;
        font-weight: 800;
        box-shadow: 0 12px 30px rgba(99, 102, 241, 0.35);
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 3px;
        font-size: clamp(23px, 4vw, 31px);
        letter-spacing: -0.03em;
      }

      h2 {
        margin-bottom: 6px;
        font-size: 18px;
      }

      .subtitle,
      .helper {
        color: var(--muted);
      }

      .subtitle {
        margin-bottom: 0;
        font-size: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 20px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 22px;
        padding: 24px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(16px);
      }

      .wallet-card {
        grid-column: 1 / -1;
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 20px;
      }

      .network-badge {
        padding: 7px 11px;
        border: 1px solid rgba(34, 211, 238, 0.25);
        border-radius: 999px;
        background: rgba(34, 211, 238, 0.08);
        color: #67e8f9;
        font-size: 12px;
        font-weight: 700;
      }

      .form-group {
        margin-top: 16px;
      }

      label {
        display: block;
        margin-bottom: 7px;
        color: #cbd5e1;
        font-size: 13px;
        font-weight: 650;
      }

      button,
      input {
        width: 100%;
        min-height: 48px;
        border-radius: 12px;
        font: inherit;
      }

      input {
        padding: 0 14px;
        border: 1px solid var(--border);
        outline: none;
        background: var(--surface-light);
        color: var(--text);
        transition: border-color 160ms, box-shadow 160ms;
      }

      input::placeholder {
        color: #64748b;
      }

      input:focus {
        border-color: var(--primary-hover);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.16);
      }

      button {
        border: 0;
        padding: 0 18px;
        background: linear-gradient(135deg, var(--primary), #4f46e5);
        color: white;
        font-weight: 700;
        cursor: pointer;
        transition: transform 160ms, filter 160ms, background 160ms;
      }

      button:hover:not(:disabled) {
        transform: translateY(-1px);
        filter: brightness(1.1);
      }

      button:active:not(:disabled) {
        transform: translateY(0);
      }

      button:disabled {
        background: #334155;
        color: #64748b;
        cursor: not-allowed;
      }

      .connect-button {
        width: auto;
        min-width: 190px;
      }

      .actions {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .balance {
        margin: 8px 0 22px;
      }

      .balance-label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .balance-value {
        display: flex;
        align-items: baseline;
        gap: 9px;
        overflow-wrap: anywhere;
        font-size: clamp(30px, 6vw, 44px);
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .balance-symbol {
        color: var(--accent);
        font-size: 15px;
        letter-spacing: 0;
      }

      .status {
        margin-top: 20px;
        padding: 14px 16px;
        border: 1px solid var(--border);
        background: var(--surface-light);
        border-radius: 12px;
        min-height: 24px;
        color: var(--muted);
        font-size: 14px;
      }

      .status.error {
        border-color: rgba(253, 164, 175, 0.2);
        background: rgba(159, 18, 57, 0.12);
        color: var(--danger);
      }

      .status.success {
        border-color: rgba(134, 239, 172, 0.16);
        color: var(--success);
      }

      @media (max-width: 680px) {
        body {
          padding: 26px 14px;
        }

        .topbar {
          align-items: stretch;
          flex-direction: column;
        }

        .connect-button {
          width: 100%;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .wallet-card {
          grid-column: auto;
        }

        .card {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="topbar">
        <div class="brand">
          <div class="logo">CC</div>
          <div>
            <h1>CampusCoin</h1>
            <p class="subtitle">Sua carteira acadêmica descentralizada</p>
          </div>
        </div>
        <button id="connectBtn" class="connect-button">Conectar MetaMask</button>
      </header>

      <div class="grid">
        <section class="card wallet-card">
          <div class="card-header">
            <div>
              <h2>Minha carteira</h2>
              <p class="subtitle">Consulte seus tokens na rede de testes.</p>
            </div>
            <span class="network-badge">Ethereum Sepolia</span>
          </div>

          <div class="form-group">
            <label for="contractAddress">Endereço do contrato</label>
            <input id="contractAddress" placeholder="0x1234..." autocomplete="off" />
          </div>
        </section>

        <section class="card">
          <div class="card-header">
            <div>
              <h2>Saldo disponível</h2>
              <p class="subtitle">Tokens associados à conta conectada.</p>
            </div>
          </div>

          <div class="balance">
            <span class="balance-label">Saldo total</span>
            <div class="balance-value">
              <span id="balance">--</span>
              <span class="balance-symbol">CAMP</span>
            </div>
          </div>

          <button id="balanceBtn" disabled>Atualizar saldo</button>
        </section>

        <section class="card">
          <div class="card-header">
            <div>
              <h2>Transferir tokens</h2>
              <p class="subtitle">Envie CAMP para outra carteira.</p>
            </div>
          </div>

          <div class="form-group">
            <label for="recipient">Carteira de destino</label>
            <input id="recipient" placeholder="0x..." autocomplete="off" />
          </div>

          <div class="form-group">
            <label for="amount">Quantidade de CAMP</label>
            <input id="amount" type="number" min="0" step="any" placeholder="0,00" />
          </div>

          <div class="actions">
            <button id="transferBtn" disabled>Transferir CAMP</button>
          </div>
        </section>
      </div>

      <div id="status" class="status">Aguardando conexão...</div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
